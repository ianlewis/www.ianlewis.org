# NOTE: must be named `autofix.ci` to securely identify the workflow
name: autofix.ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions: {}

concurrency:
  group: autofix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  autofix:
    name: autofix
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true
          persist-credentials: false
          # NOTE: We must fetch all history for `git log` to work correctly.
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      # NOTE: ruby/setup-ruby automatically reads the .ruby-version file.
      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0

      - name: update lockfiles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # NOTE: update the modified time of the Gemfile and Gemfile.lock.
          #       Git sets the modified time to the current time when checking
          #       out files, which causes `make update-lockfiles` to skip
          #       updating Gemfile.lock.
          touch -d "$(git log -1 --format=%ai "Gemfile")" "Gemfile"
          touch -d "$(git log -1 --format=%ai "Gemfile.lock")" "Gemfile.lock"
          make update-lockfiles

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        with:
          commit-message: "ci(deps): update lockfiles"
