name: html-validate

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: html-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    name: html-validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Needed to write a comment to the PR.
    steps:
      - name: Write comment to PR
        if: github.event_name == 'pull_request'
        env:
          PULL_REQUEST_NUM: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${PULL_REQUEST_NUM}" -R "${GITHUB_REPOSITORY}" \
            --create-if-none \
            --edit-last \
            --body "### 👷 Build preview processing..."

      # Checkout the PR base ref
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event_name == 'pull_request'
        with:
          path: "base"
          ref: ${{ github.event.pull_request.base.ref }}
          submodules: true
          persist-credentials: false

      # NOTE: ruby/setup-ruby automatically reads the .ruby-version file.
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        if: github.event_name == 'pull_request'
        with:
          working-directory: "base"
          bundler-cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: github.event_name == 'pull_request'
        with:
          node-version-file: "base/.node-version"

      - name: build the base ref
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTEXT: production
          # NOTE: mock the site.time to ensure consistent diff output.
          JEKYLL_BUILD_OPTIONS: --config=_config.yml,_config.mock.yml
        working-directory: "base"
        run: make build

      # Checkout the PR HEAD ref
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: "head"
          submodules: true
          persist-credentials: false

      # NOTE: ruby/setup-ruby automatically reads the .ruby-version file.
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          working-directory: "head"
          bundler-cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "head/.node-version"

      - name: build the head ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTEXT: production
          # NOTE: mock the site.time to ensure consistent diff output.
          JEKYLL_BUILD_OPTIONS: --config=_config.yml,_config.mock.yml
        working-directory: "head"
        run: make build

      - name: post diff comment
        if: github.event_name == 'pull_request'
        env:
          PULL_REQUEST_NUM: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          diff --unified=0 --recursive base/_site head/_site > diff.txt || true

          echo "### ✅ Build preview ready

          " > body.txt
          if [ -s diff.txt ]; then
            echo "<details>

          \`\`\`diff
          $(cat diff.txt)
          \`\`\`

          </details>
          " >> body.txt
          else
            echo "No differences found." >> body.txt
          fi

          gh pr comment "${PULL_REQUEST_NUM}" -R "${GITHUB_REPOSITORY}" \
            --create-if-none \
            --edit-last \
            --body-file body.txt

      - name: html-validate
        env:
          CONTEXT: production
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: "head"
        run: make html-validate
