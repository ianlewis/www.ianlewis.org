plugin:
  - id: "@textlint/textlint-plugin-text"
  - id: "@textlint/textlint-plugin-markdown"
filters:
  comments: true
rules:
  spelling:
    language: "en"
    skipPatterns:
      # Person Names and handles
      - "Andreessen"
      - "Armin"
      - "Branchaud"
      - "Collison"
      - "Cramer"
      - "Enamoto"
      - "Fikes"
      - "Ghemawat"
      - "Hightower"
      - "IanMLewis" # Ian M Lewis
      - "Makabi"
      - "Nghia"
      - "Ronacher"
      - "Sanjay"
      - "Trong"
      - "Willison"
      - "akisute"
      - "hiyosi"
      - "mcyoung"
      - "yuanying"
      - "yudppp"

      # Company/Product Names
      - "Anthropic"
      - "Apcera"
      - "Bigtable"
      - "Datastore"
      - "EuroPython"
      - "Gmail"
      - "PyCon"
      - "Jupyter"
      - "Synadia"
      - "TeleMessage"
      - "Stunlock"
      - "Oakveil"

      # Tech Names
      - "Funktion"
      - "Kubernetes"
      - "LuaLaTeX"
      - "MapReduce"
      - "Maturin"
      - "NATS" # NATS.io
      - "Neovim"
      - "Noto" # Noto fonts
      - "OpenShift"
      - "Tensorflow"
      - "XeLaTeX"
      - "cgroups" # control groups
      - "etcd" # etcd.io
      - "npm" # Node Package Manager
      - "supervisord"
      - "/[Cc]ron/"
      - "/[Mm]emcached/"
      - "/[Nn]ginx/"

      # Tech Names (cont.)
      - "pyspa" # Python Onsen
      - "PyLadies" # Python Ladies

      # Tech Terminology
      - "TrueType"
      - "Dockerfile"
      - "/[Aa]utoscaler/"
      - "/[Bb]ackend/"
      - "/[Cc]omparator/" # compare + ator
      - "/[Ff]iletype/" # file + type
      - "/[Gg]oroutine/"
      - "/[Ll]iveness/"
      - "/[Pp]laintext/"
      - "/[Ii]mpactful/" # impact + -ful
      - "/[Ii]ntegrations/" # irregular plural-form
      - "/[Ss]erverless/"
      - "/[Tt]radeoff/" # trade + off

      # Acronyms
      - "ACPI" # Advanced Configuration and Power Interface
      - "BUSL" # Business Source License
      - "CNCF" # Cloud Native Computing Foundation
      - "FaaS" # Function as a Service
      - "GCE" # Google Compute Engine
      - "GCP" # Google Cloud Platform
      - "GCPUG" # Google Cloud Platform User Group
      - "GFS" # Google File System
      - "GMP" # Goroutine, Mutex, and Channel (GMP)
      - "GKE" # Google Kubernetes Engine
      - "Gb" # Gigabyte
      - "HDFS" # Hadoop Distributed File System
      - "JSON" # JavaScript Object Notation
      - "LSP" # Language Server Protocol
      - "MCP" # Model Context Protocol
      - "MNIST" # Modified National Institute of Standards and Technology DB
      - "NoSQL" # Not Only SQL
      - "OSS" # Open Source Software
      - "PaaS" # Platform as a Service
      - "RDBMS" # Relational Database Management System
      - "SLSA" # Supply Chain Levels for Software Artifacts
      - "VC" # Venture Capital
      - "VM" # Virtual Machine
      - "YAML" # YAML Ain't Markup Language
      - "yaml" # YAML Ain't Markup Language

      - "Houthi" # Houthi movement

      - "CHANGELOG"
      - "CODEOWNER"
      - "CLI"
      - "CVSS"
      - "DCO"
      - "PR"
      - "UI"
      - "YAML"
      - "Changelog"
      - "CodeQL"
      - "Dependabot"
      - "JavaScript"
      - "MacOS"
      - "Makefile"
      - "Node.js"
      - "OpenSSF"
      - "TODO"
      - "e2e"
      - "/[Ff]ormatter/"
      - "/[Ll]inter/"
      - "/[Pp]re/"
      - "/[Rr]untime/"
      - "/[Ss]exualized/"
      - "/[Ss]ocio-economic/"
      - "/[Uu]serspace/"
      - "/[Vv]endored/"
      - "/[Vv]irtualenv/"
      - "/v[0-9]+/"
      - "/[0-9]+/"
      - ":white_check_mark:"
